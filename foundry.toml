[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.31"
optimizer = true
optimizer_runs = 200
via_ir = false
evm_version = "cancun"

remappings = [
    "@openzeppelin/=lib/openzeppelin-contracts/",
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "@openzeppelin/contracts-upgradeable/=lib/openzeppelin-contracts-upgradeable/contracts/",
    "@luxfi/=lib/standard/contracts/",
    "forge-std/=lib/forge-std/src/",
]

[profile.ci]
verbosity = 2
fuzz = { runs = 256 }

[fmt]
bracket_spacing = false
int_types = "long"
line_length = 120
multiline_func_header = "all"
number_underscore = "thousands"
quote_style = "double"
single_line_statement_blocks = "preserve"

[rpc_endpoints]
zoo_mainnet = "http://127.0.0.1:29630/ext/bc/FGanBWHZEetE7yXqGxKeUWHjDxmuKYpQ6sGdHJnrDNqQ8AoP7/rpc"
zoo_testnet = "http://127.0.0.1:29640/ext/bc/vEw2TquNRZm5ckng8fJi9JGuKiuTdQA81YNZC3A1jeYhDRH5V/rpc"
zoo_devnet = "http://127.0.0.1:29650/ext/bc/2dNppzzx7WC1cagAzVRjVP4Qf5n9BRLgVsd2L6BwDbocAVVqBz/rpc"

[doc]
out = "docs"
repository = "https://github.com/luxfi/zoo"
